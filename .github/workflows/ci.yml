# .github/workflows/ci.yml
# ? CI Pipeline - Runs on every push and pull request
# ? Purpose: Check code quality, run tests, generate Prisma Client, and build the app
# ? This helps catch bugs early before merging to main

name: CI - Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ? Generate Prisma Client (needs DATABASE_URL only for generation, not real connection)
      - name: Generate Prisma Client
        run: npm run prisma:generate
        env:
          # Dummy URL is enough for prisma generate
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/unused"

      - name: Run Linter
        run: npm run lint

      # ? Run tests (if you have them). Uses TEST_DATABASE_URL secret for test DB
      - name: Run Tests
        run: npm test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}

      - name: Build the app
        run: npm run build
