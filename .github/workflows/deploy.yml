# .github/workflows/deploy.yml
# ? CD Pipeline - Continuous Deployment
# ? Runs only when code is pushed to main branch
# ? This workflow builds the Docker image and deploys it
# ? Important: It runs prisma migrate deploy against production database

name: CD - Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ? Generate Prisma Client before migrations and build
      - name: Generate Prisma Client
        run: npm run prisma:generate

      # ? This is the most important step for production
      # ? It safely applies all pending Prisma migrations to your live database
      # ! Never use "prisma migrate dev" in production
      - name: Run Prisma Migrations (Production)
        run: npm run prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Build the app
        run: npm run build

      # ? Login to GitHub Container Registry (GHCR) to push Docker image
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ? Build and push the Docker image
      # ? The image will be available at ghcr.io/yourusername/yourrepo/job-tracker-api:latest
      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/job-tracker-api:latest
