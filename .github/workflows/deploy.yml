# .github/workflows/deploy.yml
# ? CD Pipeline - Continuous Deployment
# ? Runs only when code is pushed to main branch
# ? This safely applies Prisma migrations to production and builds/pushes the Docker image

name: CD - Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    # ? Set PRODUCTION_DATABASE_URL at the job level so all steps can access it
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ? Generate Prisma Client (needs DATABASE_URL for some Prisma versions)
      - name: Generate Prisma Client
        run: npm run prisma:generate

      # ? Safely apply pending migrations to your PRODUCTION database
      # ? This is the correct command for production (non-interactive)
      - name: Run Prisma Migrations (Production)
        run: npm run prisma:migrate:deploy
        # DATABASE_URL is already set at job level

      - name: Build the app
        run: npm run build

      # ? Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ? Build and push Docker image
      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/job-tracker-api:latest
